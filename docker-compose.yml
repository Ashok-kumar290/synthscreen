services:
  biolens:
    build: .
    ports:
      - "8501:8501"
    environment:
      BIOLENS_MODE: ${BIOLENS_MODE:-offline}
      BIOLENS_DB_PATH: /app/data/biolens.db
      SYNTHSCREEN_ENDPOINT: ${SYNTHSCREEN_ENDPOINT:-}
      SYNTHSCREEN_TIMEOUT_SECONDS: ${SYNTHSCREEN_TIMEOUT_SECONDS:-30}
    volumes:
      - biolens_data:/app/data

volumes:
  biolens_data:
